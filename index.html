<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f17;
  color: white;
}

header {
  padding: 12px;
  text-align: center;
  background: #111827;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  background: #1f2937;
  border-radius: 10px;
  overflow: hidden;
}

img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.content {
  padding: 8px;
}

.price {
  color: #22c55e;
  font-weight: bold;
}

.timer {
  color: #fbbf24;
}
</style>
</head>

<body>

<header>🚗 LIVE AUCTION (VOICE ENABLED)</header>

<div id="cars">Loading...</div>

<button onclick="speechSynthesis.resume()">🔊 Enable Voice</button>

<script>

const SHEET_URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent(
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtiWlgxCNrAbk0bMhI2EEkDHeVtP2FHSV_F2dpZFrf8m7eomJBDYkN69vNTpD9YGScx4Ceq-E179Q9/pub?gid=0&single=true&output=csv"
);

let carsData = [];
let lastBid = {};
let state = {};

// 🔊 VOICE
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();
  msg.voice = voices.find(v => v.name.includes("David")) || voices[0];

  speechSynthesis.speak(msg);
}

// 🚗 LOAD DATA (NO API)
async function loadCars() {

  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));

  carsData = rows.slice(1).map(r => ({
    car: r[0],
    image: r[1],
    bid: Number(r[2]),
    bidder: r[3],
    endTime: r[4]
  }));

  render();
}

// 🎨 RENDER
function render() {

  let html = `<div class="grid">`;

  carsData.forEach(car => {

    html += `
      <div class="card">
        <img src="${car.image}">
        <div class="content">
          <h3>${car.car}</h3>
          <div class="price">$${car.bid}</div>
          <div>${car.bidder}</div>
          <div class="timer" id="t-${car.car}"></div>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("cars").innerHTML = html;
}

// ⏱ TIMER + VOICE LOGIC
function update() {

  carsData.forEach(car => {

    const el = document.getElementById("t-" + car.car);
    if (!el) return;

    const diff = new Date(car.endTime).getTime() - Date.now();

    if (diff <= 0) {
      el.innerText = "🔴 SOLD";
      return;
    }

    const s = Math.floor((diff % 60000) / 1000);
    const m = Math.floor(diff / 60000);

    el.innerText = `${m}m ${s}s`;

    if (!state[car.car]) state[car.car] = 0;

    if (diff < 15000 && state[car.car] === 0) {
      speak(car.car + " going once");
      state[car.car] = 1;
    }

    else if (diff < 8000 && state[car.car] === 1) {
      speak(car.car + " going twice");
      state[car.car] = 2;
    }

    else if (diff <= 0 && state[car.car] === 2) {
      speak(car.car + " SOLD to " + car.bidder);
      state[car.car] = 3;
    }

    // 💰 NEW BID VOICE
    if (lastBid[car.car] && car.bid > lastBid[car.car]) {
      speak(car.car + " new bid " + car.bid);
    }

    lastBid[car.car] = car.bid;

  });
}

// 🔄 LOOP
loadCars();
setInterval(loadCars, 3000);
setInterval(update, 1000);

</script>

</body>
</html>
