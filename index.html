<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f17;
  color: white;
}

header {
  padding: 12px;
  text-align: center;
  background: #111827;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  background: #1f2937;
  border-radius: 10px;
  overflow: hidden;
}

img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.content {
  padding: 8px;
}

.price {
  color: #22c55e;
  font-weight: bold;
}

.timer {
  color: #fbbf24;
}
</style>
</head>

<body>

<header>🚗 LIVE AUCTION (VOICE ENABLED)</header>

<div id="cars">Loading...</div>

<button onclick="speechSynthesis.resume()">🔊 Enable Voice</button>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtiWlgxCNrAbk0bMhI2EEkDHeVtP2FHSV_F2dpZFrf8m7eomJBDYkN69vNTpD9YGScx4Ceq-E179Q9/pub?gid=0&single=true&output=csv";

let carsData = [];
let state = {};
let lastBid = {};

// 🔊 Voice system
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();
  msg.voice = voices.find(v => v.name.includes("David")) || voices[0];
  msg.rate = 1;
  speechSynthesis.speak(msg);
}

// 🧠 Parse CSV safely
function parseCSV(text) {
  return text.replace(/\r/g, "").split("\n").map(r => r.split(","));
}

// 🚗 Load sheet data
async function loadCars() {

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const rows = parseCSV(text);

    carsData = rows.slice(1).map(r => ({
      car: r[0],
      image: r[1],
      bid: Number(r[2]) || 0,
      bidder: r[3] || "None",
      endTime: r[4]
    })).filter(c => c.car);

    render();

  } catch (e) {
    document.getElementById("cars").innerHTML =
      "❌ Failed to load auction data";
  }
}

// 🎨 Render UI + BID BUTTONS
function render() {

  let html = `<div class="grid">`;

  carsData.forEach((car, index) => {

    const id = car.car.replace(/\s/g, "");

    html += `
      <div class="card">

        <img src="${car.image}">

        <div class="content">

          <h3>${car.car}</h3>

          <div class="price" id="price-${id}">$${car.bid}</div>
          <div id="bidder-${id}">${car.bidder}</div>

          <div class="timer" id="t-${id}"></div>

          <button onclick="placeBid(${index}, 100)">➕ Bid +$100</button>
          <button onclick="placeBid(${index}, 500)">🔥 Bid +$500</button>

        </div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("cars").innerHTML = html;
}

// 💰 BID FUNCTION (LOCAL REAL-TIME UPDATE)
function placeBid(index, amount) {

  const car = carsData[index];

  car.bid += amount;
  car.bidder = "You";

  const id = car.car.replace(/\s/g, "");

  // Update UI instantly
  document.getElementById("price-" + id).innerText = "$" + car.bid;
  document.getElementById("bidder-" + id).innerText = "You";

  // Voice announcement
  speak(car.car + " bid placed " + car.bid);

  lastBid[car.car] = car.bid;
}

// ⏱ Timer + auction voice
function update() {

  carsData.forEach(car => {

    const id = car.car.replace(/\s/g, "");
    const el = document.getElementById("t-" + id);

    if (!el) return;

    const diff = new Date(car.endTime).getTime() - Date.now();

    if (diff <= 0) {
      el.innerText = "🔴 SOLD";
      return;
    }

    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    el.innerText = `${m}m ${s}s`;

    if (!state[car.car]) state[car.car] = 0;

    if (diff < 15000 && state[car.car] === 0) {
      speak(car.car + " going once");
      state[car.car] = 1;
    }

    else if (diff < 8000 && state[car.car] === 1) {
      speak(car.car + " going twice");
      state[car.car] = 2;
    }

    else if (diff <= 0 && state[car.car] === 2) {
      speak(car.car + " SOLD to " + car.bidder);
      state[car.car] = 3;
    }
  });
}

// 🔄 LOOP
loadCars();
setInterval(loadCars, 5000);
setInterval(update, 1000);

</script>

</body>
</html>
